<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

  <body>
    <form id="form">
      <div class="name">
        <label for="">Name</label>

      <div class="name">

          <option value="intern">Intern</option>

      <div class="name">
        <label >Would you like to recommende gfg to a friend</label>
        <label for="recommended1">

        </label>
        <label for="recommended2">

        </label>
        <label for="recommended3">

      </div>

      <div class="name">

        <label for="inp-3">
            <input type="checkbox" name="inp">java
        </label>

        <label for="inp-4">
            <input type="checkbox" name="inp">Python
        </label>

        <label for="inp-5">

        </label>
      </div>

      <div class="form">
        <label for="comment">Any comment or suggestion</label>
        <textarea name="comment" id="comment" placeholder="Enter your comment here"></textarea>
      </div>

      <button type="submit" value="submit">Submit</button>

    </form>
  </body>
</html>
